spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
      - http://localhost:5173

  rate-limit:
    enabled: false

  feature-flags:
    email-notifications: false
    sms-notifications: false

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.springshop: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
